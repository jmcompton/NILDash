<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NILDash Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A08;color:#F0EDE6;font-family:'DM Mono',monospace;font-size:13px;padding:40px}
h1{font-size:22px;font-weight:700;color:#C8F135;margin-bottom:4px}
.sub{color:rgba(240,237,230,0.4);font-size:11px;margin-bottom:32px}
.stats{display:flex;gap:16px;margin-bottom:32px}
.stat{background:#111110;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px 20px;min-width:120px}
.stat-val{font-size:28px;font-weight:700;color:#C8F135}
.stat-lbl{font-size:10px;color:rgba(240,237,230,0.4);text-transform:uppercase;letter-spacing:0.1em;margin-top:4px}
table{width:100%;border-collapse:collapse;background:#111110;border-radius:10px;overflow:hidden}
th{padding:12px 16px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(240,237,230,0.4);border-bottom:1px solid rgba(255,255,255,0.06)}
td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700}
.badge-pending{background:rgba(245,158,11,0.15);color:#f59e0b}
.badge-approved{background:rgba(200,241,53,0.15);color:#C8F135}
.badge-denied{background:rgba(239,68,68,0.15);color:#ef4444}
.btn{padding:6px 14px;border-radius:40px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:'DM Mono',monospace}
.btn-approve{background:#C8F135;color:#000}
.btn-deny{background:transparent;border:1px solid rgba(239,68,68,0.4);color:#ef4444}
.btn-approve:disabled,.btn-deny:disabled{opacity:0.4;cursor:not-allowed}
.empty{text-align:center;padding:48px;color:rgba(240,237,230,0.3)}
.actions{display:flex;gap:8px}
a.back{color:rgba(240,237,230,0.4);text-decoration:none;font-size:11px;display:inline-block;margin-bottom:24px}
a.back:hover{color:#C8F135}
</style>
</head>
<body>
<a href="/" class="back">← Back to app</a>
<h1>NILDash Admin</h1>
<div style="margin:24px 0;background:#111110;border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden">
  <div style="padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between">
    <div style="font-size:14px;font-weight:600;color:#f0ede6">User Plans</div>
    <button onclick="loadUsers()" style="font-size:11px;padding:6px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#f0ede6;cursor:pointer">&#8635; Refresh</button>
  </div>
  <table style="width:100%;border-collapse:collapse">
    <thead>
      <tr style="border-bottom:1px solid rgba(255,255,255,0.08)">
        <th style="padding:10px 12px;text-align:left;font-size:10px;color:rgba(240,237,230,0.4);text-transform:uppercase;letter-spacing:0.08em">Name</th>
        <th style="padding:10px 12px;text-align:left;font-size:10px;color:rgba(240,237,230,0.4);text-transform:uppercase;letter-spacing:0.08em">Email</th>
        <th style="padding:10px 12px;text-align:left;font-size:10px;color:rgba(240,237,230,0.4);text-transform:uppercase;letter-spacing:0.08em">Plan</th>
        <th style="padding:10px 12px;text-align:left;font-size:10px;color:rgba(240,237,230,0.4);text-transform:uppercase;letter-spacing:0.08em">Change Plan</th>
        <th style="padding:10px 12px;text-align:left;font-size:10px;color:rgba(240,237,230,0.4);text-transform:uppercase;letter-spacing:0.08em">Joined</th>
      </tr>
    </thead>
    <tbody id="users-table"><tr><td colspan="5" style="padding:20px;text-align:center;color:rgba(240,237,230,0.3);font-size:12px">Loading...</td></tr></tbody>
  </table>
</div>
<div class="sub">Access request management</div>
<div class="stats">
  <div class="stat"><div class="stat-val" id="total">—</div><div class="stat-lbl">Total</div></div>
  <div class="stat"><div class="stat-val" id="pending" style="color:#f59e0b">—</div><div class="stat-lbl">Pending</div></div>
  <div class="stat"><div class="stat-val" id="approved">—</div><div class="stat-lbl">Approved</div></div>
  <div class="stat"><div class="stat-val" id="denied" style="color:#ef4444">—</div><div class="stat-lbl">Denied</div></div>
</div>
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Agency</th>
      <th>Athletes</th>
      <th>Date</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="requests-body">
    <tr><td colspan="7" class="empty">Loading...</td></tr>
  </tbody>
</table>
<script>
async function load() {
  const r = await fetch('/api/admin/requests');
  const data = await r.json();
  if (data.error) { document.getElementById('requests-body').innerHTML = '<tr><td colspan="7" class="empty">' + data.error + '</td></tr>'; return; }
  const reqs = data.requests || [];
  document.getElementById('total').textContent = reqs.length;
  document.getElementById('pending').textContent = reqs.filter(r=>r.status==='pending').length;
  document.getElementById('approved').textContent = reqs.filter(r=>r.status==='approved').length;
  document.getElementById('denied').textContent = reqs.filter(r=>r.status==='denied').length;
  if (!reqs.length) {
    document.getElementById('requests-body').innerHTML = '<tr><td colspan="7" class="empty">No requests yet</td></tr>';
    return;
  }
  document.getElementById('requests-body').innerHTML = reqs.map(r => {
    const date = new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const badgeClass = r.status==='approved'?'badge-approved':r.status==='denied'?'badge-denied':'badge-pending';
    return '<tr>' +
      '<td>' + r.first_name + ' ' + r.last_name + '</td>' +
      '<td>' + r.email + '</td>' +
      '<td>' + (r.agency||'—') + '</td>' +
      '<td>' + (r.athletes||'—') + '</td>' +
      '<td>' + date + '</td>' +
      '<td><span class="badge ' + badgeClass + '">' + r.status + '</span></td>' +
      '<td><div class="actions">' +
        '<button class="btn btn-approve" onclick="approve(' + r.id + ',this)" ' + (r.status!=='pending'?'disabled':'') + '>Approve</button>' +
        '<button class="btn btn-deny" onclick="deny(' + r.id + ',this)" ' + (r.status!=='pending'?'disabled':'') + '>Deny</button>' +
      '</div></td>' +
    '</tr>';
  }).join('');
}
async function approve(id, btn) {
  btn.disabled = true; btn.textContent = '...';
  await fetch('/api/admin/requests/' + id + '/approve', {method:'POST'});
  load();
}
async function deny(id, btn) {
  btn.disabled = true; btn.textContent = '...';
  await fetch('/api/admin/requests/' + id + '/deny', {method:'POST'});
  load();
}
load();
</script>
<script>
// Load users
async function loadUsers() {
  const r = await fetch('/api/admin/users');
  if (!r.ok) return;
  const users = await r.json();
  const el = document.getElementById('users-table');
  if (!el) return;
  el.innerHTML = users.map(u => {
    const trialDays = u.trial_ends_at ? Math.ceil((new Date(u.trial_ends_at) - new Date()) / 86400000) : null;
    const planColor = u.plan === 'beta' ? '#4ade80' : u.plan === 'trial' ? '#f59e0b' : u.plan === 'starter' ? '#60a5fa' : u.plan === 'pro' ? '#a78bfa' : '#6b7280';
    return '<tr style="border-bottom:1px solid rgba(255,255,255,0.06)">' +
      '<td style="padding:10px 12px;font-size:12px;color:#f0ede6">' + (u.name||'—') + '</td>' +
      '<td style="padding:10px 12px;font-size:12px;color:rgba(240,237,230,0.5)">' + u.email + '</td>' +
      '<td style="padding:10px 12px">' +
        '<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:' + planColor + '20;color:' + planColor + ';font-weight:700;text-transform:uppercase">' + (u.plan||'beta') + '</span>' +
        (trialDays !== null ? '<span style="font-size:10px;color:rgba(240,237,230,0.4);margin-left:6px">' + trialDays + 'd left</span>' : '') +
      '</td>' +
      '<td style="padding:10px 12px">' +
        '<select onchange="setPlan('' + u.id + '', this.value)" style="background:#1a1a18;border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#f0ede6;font-size:11px;padding:4px 8px">' +
          ['beta','trial','starter','pro','suspended'].map(p => '<option value="' + p + '"' + (u.plan===p?' selected':'') + '>' + p + '</option>').join('') +
        '</select>' +
      '</td>' +
      '<td style="padding:10px 12px;font-size:11px;color:rgba(240,237,230,0.4)">' + new Date(u.created_at).toLocaleDateString() + '</td>' +
    '</tr>';
  }).join('');
}

async function setPlan(userId, plan) {
  const r = await fetch('/api/admin/set-plan', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ userId, plan })
  });
  const data = await r.json();
  if (data.ok) {
    showToast('Plan updated to ' + plan);
    setTimeout(loadUsers, 500);
  }
}

function showToast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#4ade80;color:#000;padding:10px 16px;border-radius:6px;font-size:12px;font-weight:600;z-index:999';
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}

setTimeout(loadUsers, 500);
</script>
</body>
</html>
