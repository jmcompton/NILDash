<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIL Report — NILDash</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A08;color:#F0EDE6;font-family:"DM Mono",monospace;font-size:13px;min-height:100vh;padding:0}
.header{background:#111110;border-bottom:1px solid rgba(255,255,255,0.08);padding:20px 32px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;color:#C8F135}
.expires{font-size:10px;color:rgba(240,237,230,0.4)}
.container{max-width:720px;margin:0 auto;padding:32px 20px}
.hero{background:linear-gradient(135deg,#111110 0%,#1A1A18 100%);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:32px;margin-bottom:24px;text-align:center}
.athlete-name{font-family:"Syne",sans-serif;font-size:32px;font-weight:800;color:#F0EDE6;margin-bottom:6px}
.athlete-sub{font-size:13px;color:rgba(240,237,230,0.5);margin-bottom:24px}
.nil-val{font-size:48px;font-weight:800;color:#C8F135;font-family:"Syne",sans-serif;margin-bottom:4px}
.nil-label{font-size:11px;color:rgba(240,237,230,0.4);text-transform:uppercase;letter-spacing:0.1em}
.card{background:#111110;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-size:10px;font-weight:700;color:rgba(240,237,230,0.4);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:16px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.kpi{background:#1A1A18;border-radius:8px;padding:14px;text-align:center}
.kpi-val{font-size:22px;font-weight:700;color:#C8F135;font-family:"Syne",sans-serif}
.kpi-lbl{font-size:10px;color:rgba(240,237,230,0.4);margin-top:4px}
.deal-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.deal-row:last-child{border-bottom:none}
.deal-brand{font-size:13px;font-weight:600;color:#F0EDE6}
.deal-meta{font-size:11px;color:rgba(240,237,230,0.4);margin-top:2px}
.deal-val{font-size:13px;font-weight:700;color:#C8F135}
.stage-badge{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700}
.stage-Negotiating{background:rgba(200,241,53,0.15);color:#C8F135}
.stage-Closing{background:rgba(74,222,128,0.15);color:#4ade80}
.stage-Closed{background:rgba(167,139,250,0.15);color:#a78bfa}
.stage-Prospecting{background:rgba(107,114,128,0.15);color:#9ca3af}
.stage-Outreach{background:rgba(96,165,250,0.15);color:#60a5fa}
.rate-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rate-item{background:#1A1A18;border-radius:8px;padding:12px}
.rate-type{font-size:10px;color:rgba(240,237,230,0.4);margin-bottom:4px}
.rate-amount{font-size:14px;font-weight:700;color:#F0EDE6}
.msg-box{background:rgba(200,241,53,0.05);border:1px solid rgba(200,241,53,0.2);border-radius:10px;padding:16px;margin-bottom:16px}
.msg-from{font-size:10px;color:#C8F135;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.1em}
.msg-text{font-size:13px;color:#F0EDE6;line-height:1.7}
.footer{text-align:center;padding:32px 20px;color:rgba(240,237,230,0.3);font-size:11px}
.empty{color:rgba(240,237,230,0.3);font-size:12px;text-align:center;padding:20px}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px}
.stat-row:last-child{border-bottom:none}
.stat-label{color:rgba(240,237,230,0.5)}
.stat-val{font-weight:600;color:#F0EDE6}
</style>
</head>
<body>
<div class="header">
  <div class="logo">NILDash</div>
  <div class="expires" id="expires-label"></div>
</div>

<div class="container">
  <div id="loading" style="text-align:center;padding:80px 20px;color:rgba(240,237,230,0.4)">Loading report...</div>
  <div id="report-content" style="display:none">

    <div class="hero">
      <div class="athlete-name" id="r-name"></div>
      <div class="athlete-sub" id="r-sub"></div>
      <div class="nil-val" id="r-nil-val"></div>
      <div class="nil-label">Estimated NIL Value (IG Reel)</div>
    </div>

    <div id="r-message" style="display:none" class="card">
      <div class="card-title">Message from Your Agent</div>
      <div class="msg-text" id="r-message-text"></div>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-val" id="r-total-deals">0</div><div class="kpi-lbl">Total Deals</div></div>
      <div class="kpi"><div class="kpi-val" id="r-pipeline-val">$0</div><div class="kpi-lbl">Pipeline Value</div></div>
      <div class="kpi"><div class="kpi-val" id="r-closed">0</div><div class="kpi-lbl">Deals Closed</div></div>
    </div>

    <div class="card">
      <div class="card-title">Active Deals</div>
      <div id="r-deals"></div>
    </div>

    <div class="card">
      <div class="card-title">NIL Rate Card</div>
      <div class="rate-grid" id="r-rates"></div>
    </div>

    <div class="card">
      <div class="card-title">Athlete Profile</div>
      <div id="r-profile"></div>
    </div>

  </div>
</div>

<div class="footer">
  Generated by NILDash · mynildash.com · Confidential
</div>

<script>
var token = window.location.pathname.split("/report/")[1];
if (!token) {
  document.getElementById("loading").textContent = "Invalid report link.";
} else {
  fetch("/api/reports/" + token)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        document.getElementById("loading").textContent = data.error;
        return;
      }
      document.getElementById("loading").style.display = "none";
      document.getElementById("report-content").style.display = "block";

      var ath = data.athlete;
      var deals = data.deals || [];
      var rate = data.rate || {};

      // Expires
      var exp = new Date(data.expiresAt);
      document.getElementById("expires-label").textContent = "Expires " + exp.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

      // Hero
      document.getElementById("r-name").textContent = ath.name || "Athlete";
      document.getElementById("r-sub").textContent = (ath.sport||"") + (ath.position?" · "+ath.position:"") + (ath.school?" · "+ath.school:"");
      document.getElementById("r-nil-val").textContent = rate.low && rate.high ? "$"+rate.low.toLocaleString()+" – $"+rate.high.toLocaleString() : "—";

      // Agent message
      if (data.agentMessage) {
        document.getElementById("r-message").style.display = "block";
        document.getElementById("r-message-text").textContent = data.agentMessage;
      }

      // KPIs
      var totalVal = deals.reduce(function(s,d){ return s+(d.value||0); },0);
      var closed = deals.filter(function(d){ return d.stage==="Closed"; });
      document.getElementById("r-total-deals").textContent = deals.length;
      document.getElementById("r-pipeline-val").textContent = "$"+(totalVal/1000).toFixed(0)+"K";
      document.getElementById("r-closed").textContent = closed.length;

      // Deals
      var dealsEl = document.getElementById("r-deals");
      if (!deals.length) {
        dealsEl.innerHTML = "<div class=\"empty\">No active deals yet</div>";
      } else {
        dealsEl.innerHTML = deals.map(function(d) {
          var stageClass = "stage-"+(d.stage||"").replace(" ","");
          return "<div class=\"deal-row\">" +
            "<div><div class=\"deal-brand\">"+(d.brand||"Brand")+"</div>" +
            "<div class=\"deal-meta\">"+(d.campaign||"")+"</div></div>" +
            "<div style=\"display:flex;align-items:center;gap:10px\">" +
              "<span class=\"stage-badge "+stageClass+"\">"+(d.stage||"")+"</span>" +
              "<div class=\"deal-val\">$"+(d.value||0).toLocaleString()+"</div>" +
            "</div>" +
          "</div>";
        }).join("");
      }

      // Rate card
      var deliverables = [
        ["IG Post", "ig-post"],["IG Reel", "ig-reel"],["TikTok", "tiktok"],
        ["Story Set", "stories"],["Bundle", "bundle"],["Retainer/mo", "retainer"]
      ];
      document.getElementById("r-rates").innerHTML = deliverables.map(function(d) {
        var low = rate.low || 0;
        var multipliers = {"ig-post":0.77,"ig-reel":1.0,"tiktok":0.69,"stories":0.35,"bundle":1.85,"retainer":3.23};
        var mult = multipliers[d[1]] || 1;
        var lo = Math.round(low * mult);
        var hi = Math.round((rate.high||0) * mult);
        return "<div class=\"rate-item\">" +
          "<div class=\"rate-type\">"+(d[0])+"</div>" +
          "<div class=\"rate-amount\">$"+lo.toLocaleString()+" – $"+hi.toLocaleString()+"</div>" +
        "</div>";
      }).join("");

      // Profile
      var reach = (ath.instagram||0)+(ath.tiktok||0);
      var tier = reach>500000?"Macro":reach>100000?"Mid":reach>25000?"Micro":"Nano";
      var profileItems = [
        ["School", ath.school||"—"],
        ["School Tier", ath.schoolTier||"—"],
        ["Instagram", (ath.instagram||0).toLocaleString()+" followers"],
        ["TikTok", (ath.tiktok||0).toLocaleString()+" followers"],
        ["Engagement Rate", (ath.engagement||0)+"%"],
        ["Social Tier", tier],
        ["Year", ath.year||"—"],
      ];
      document.getElementById("r-profile").innerHTML = profileItems.map(function(item) {
        return "<div class=\"stat-row\"><span class=\"stat-label\">"+(item[0])+"</span><span class=\"stat-val\">"+(item[1])+"</span></div>";
      }).join("");
    })
    .catch(function() {
      document.getElementById("loading").textContent = "Error loading report. Try again.";
    });
}
</script>
</body>
</html>
