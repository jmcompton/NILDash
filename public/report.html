<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIL Brand Pitch — NILDash</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A08;color:#F0EDE6;font-family:"DM Mono",monospace;font-size:13px}
.page{max-width:680px;margin:0 auto;padding:40px 24px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo{font-family:"Syne",sans-serif;font-size:16px;font-weight:800;color:#C8F135}
.confidential{font-size:10px;color:rgba(240,237,230,0.3);letter-spacing:0.1em;text-transform:uppercase}
.hero{display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:start;margin-bottom:36px}
.avatar{width:100px;height:100px;border-radius:12px;background:linear-gradient(135deg,rgba(200,241,53,0.2),rgba(200,241,53,0.05));border:1px solid rgba(200,241,53,0.2);display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-size:36px;font-weight:800;color:#C8F135;flex-shrink:0}
.athlete-name{font-family:"Syne",sans-serif;font-size:36px;font-weight:800;color:#F0EDE6;line-height:1;margin-bottom:6px}
.athlete-meta{font-size:13px;color:rgba(240,237,230,0.5);margin-bottom:16px}
.tags{display:flex;gap:8px;flex-wrap:wrap}
.tag{font-size:10px;padding:4px 10px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em}
.tag-sport{background:rgba(200,241,53,0.12);color:#C8F135;border:1px solid rgba(200,241,53,0.2)}
.tag-tier{background:rgba(255,255,255,0.06);color:rgba(240,237,230,0.6);border:1px solid rgba(255,255,255,0.08)}
.section{margin-bottom:32px}
.section-title{font-size:10px;font-weight:700;color:rgba(240,237,230,0.35);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title::after{content:"";flex:1;height:1px;background:rgba(255,255,255,0.06)}
.reach-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.reach-card{background:#111110;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px;text-align:center}
.reach-val{font-family:"Syne",sans-serif;font-size:22px;font-weight:700;color:#F0EDE6;margin-bottom:2px}
.reach-lbl{font-size:10px;color:rgba(240,237,230,0.35);text-transform:uppercase;letter-spacing:0.06em}
.reach-sub{font-size:11px;color:#C8F135;margin-top:2px;font-weight:600}
.selling-points{display:flex;flex-direction:column;gap:10px}
.sp-row{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:#111110;border:1px solid rgba(255,255,255,0.07);border-radius:8px}
.sp-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.sp-text{font-size:12px;color:rgba(240,237,230,0.8);line-height:1.6}
.sp-bold{font-weight:600;color:#F0EDE6}
.rate-table{width:100%;border-collapse:collapse}
.rate-table th{font-size:10px;color:rgba(240,237,230,0.35);text-transform:uppercase;letter-spacing:0.08em;padding:8px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06)}
.rate-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px}
.rate-table tr:last-child td{border-bottom:none}
.rate-val{font-weight:700;color:#C8F135}
.brands-grid{display:flex;flex-wrap:wrap;gap:8px}
.brand-chip{padding:6px 14px;background:#111110;border:1px solid rgba(255,255,255,0.1);border-radius:40px;font-size:11px;color:rgba(240,237,230,0.7)}
.cta{background:linear-gradient(135deg,rgba(200,241,53,0.08),rgba(200,241,53,0.03));border:1px solid rgba(200,241,53,0.2);border-radius:12px;padding:24px;text-align:center}
.cta-title{font-family:"Syne",sans-serif;font-size:18px;font-weight:700;color:#F0EDE6;margin-bottom:6px}
.cta-sub{font-size:12px;color:rgba(240,237,230,0.5);margin-bottom:16px}
.cta-contact{font-size:13px;color:#C8F135;font-weight:600}
.footer{margin-top:40px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center}
.footer-logo{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:rgba(240,237,230,0.3)}
.footer-note{font-size:10px;color:rgba(240,237,230,0.2)}
.empty{color:rgba(240,237,230,0.3);font-size:12px;font-style:italic}
@media print{body{background:#fff;color:#000}.page{padding:20px}.avatar{background:#f0f0f0;color:#000}.reach-card,.sp-row{background:#f8f8f8;border-color:#e0e0e0}.rate-table td,.rate-table th{color:#000}.section-title,.reach-lbl,.footer-note{color:#666}.reach-val,.athlete-name{color:#000}.cta{background:#f0f0f0;border-color:#ccc}.logo,.cta-contact,.rate-val,.reach-sub{color:#2a6e00}}
</style>
</head>
<body>
<div class="page">
  <div id="loading" style="text-align:center;padding:80px;color:rgba(240,237,230,0.3)">Loading pitch deck...</div>
  <div id="content" style="display:none">

    <div class="header">
      <div class="logo">NILDash</div>
      <div class="confidential">Confidential Brand Pitch</div>
    </div>

    <div class="hero">
      <div class="avatar" id="r-initials"></div>
      <div>
        <div class="athlete-name" id="r-name"></div>
        <div class="athlete-meta" id="r-meta"></div>
        <div class="tags" id="r-tags"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Why This Athlete</div>
      <div class="selling-points" id="r-selling-points"></div>
    </div>

    <div class="section">
      <div class="section-title">Social Reach & Engagement</div>
      <div class="reach-grid" id="r-reach"></div>
    </div>

    <div class="section">
      <div class="section-title">Rate Card</div>
      <table class="rate-table">
        <thead><tr><th>Deliverable</th><th>Rate</th><th>Notes</th></tr></thead>
        <tbody id="r-rates"></tbody>
      </table>
    </div>

    <div class="section" id="r-brands-section">
      <div class="section-title">Brand Experience</div>
      <div class="brands-grid" id="r-brands"></div>
    </div>

    <div class="section" id="r-message-section" style="display:none">
      <div class="section-title">Campaign Concept</div>
      <div style="background:#111110;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px;font-size:13px;color:rgba(240,237,230,0.8);line-height:1.7" id="r-message-text"></div>
    </div>

    <div class="cta">
      <div class="cta-title">Ready to Partner?</div>
      <div class="cta-sub">Contact the agent to discuss deal terms and availability.</div>
      <div class="cta-contact" id="r-agent"></div>
    </div>

    <div class="footer">
      <div class="footer-logo">NILDash</div>
      <div class="footer-note" id="r-expires"></div>
    </div>

  </div>
</div>

<script>
var token = window.location.pathname.split("/report/")[1];
if (!token) { document.getElementById("loading").textContent = "Invalid link."; }
else {
  fetch("/api/reports/" + token).then(function(r){return r.json();}).then(function(data){
    if (data.error) { document.getElementById("loading").textContent = data.error; return; }
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";

    var ath = data.athlete;
    var deals = data.deals || [];
    var rate = data.rate || {};
    var agent = data.agent || {};

    // Initials
    var parts = (ath.name||"A").split(" ");
    document.getElementById("r-initials").textContent = parts.map(function(p){return p[0];}).join("").substring(0,2).toUpperCase();

    // Name + meta
    document.getElementById("r-name").textContent = ath.name || "Athlete";
    document.getElementById("r-meta").textContent = [ath.position, ath.sport, ath.school, ath.year].filter(Boolean).join(" · ");

    // Tags
    var reach = (ath.instagram||0)+(ath.tiktok||0);
    var tier = reach>500000?"Macro Influencer":reach>100000?"Mid-Tier":reach>25000?"Micro Influencer":"Nano Influencer";
    document.getElementById("r-tags").innerHTML =
      (ath.sport ? '<span class="tag tag-sport">'+ath.sport+'</span>' : "") +
      (ath.schoolTier ? '<span class="tag tag-tier">'+ath.schoolTier+'</span>' : "") +
      '<span class="tag tag-tier">'+tier+"</span>";

    // Selling points
    var eng = parseFloat(ath.engagement||0);
    var avgEng = ath.sport && ath.sport.toLowerCase().includes("basketball") ? 4.5 : 3.8;
    var engLabel = eng > avgEng ? "Above average engagement for "+ath.sport : "Consistent engagement rate";
    var sp = [
      { icon: "&#128293;", bold: "Authentic college athlete voice", text: " — real student-athlete content that resonates with 18-24 demographic." },
      { icon: "&#127775;", bold: engLabel, text: " at "+eng+"% vs "+avgEng+"% sport average. High-quality, engaged following." },
      { icon: "&#127942;", bold: "Competitive program at "+(ath.school||"a top university"), text: " with national media exposure and strong alumni network." },
      { icon: "&#128205;", bold: "Market reach in "+(ath.school ? ath.school.replace("University","").replace("of","").trim() : "college market"), text: " — highly targeted local and regional brand exposure." },
    ];
    document.getElementById("r-selling-points").innerHTML = sp.map(function(s){
      return '<div class="sp-row"><div class="sp-icon">'+s.icon+'</div><div class="sp-text"><span class="sp-bold">'+s.bold+"</span>"+s.text+"</div></div>";
    }).join("");

    // Reach grid
    var igFmt = (ath.instagram||0) >= 1000 ? ((ath.instagram||0)/1000).toFixed(1)+"K" : String(ath.instagram||0);
    var ttFmt = (ath.tiktok||0) >= 1000 ? ((ath.tiktok||0)/1000).toFixed(1)+"K" : String(ath.tiktok||0);
    var totalFmt = reach >= 1000 ? (reach/1000).toFixed(1)+"K" : String(reach);
    document.getElementById("r-reach").innerHTML =
      reachCard(igFmt, "Instagram", (ath.instagram||0) > 0 ? "Active" : "—") +
      reachCard(ttFmt, "TikTok", (ath.tiktok||0) > 0 ? "Active" : "—") +
      reachCard(totalFmt, "Total Reach", "Combined") +
      reachCard(eng+"%", "Engagement", eng > avgEng ? "Above avg" : "On target");

    // Rate card
    var deliverables = [
      ["IG Reel (30-60s)", "ig-reel", 1.0, "Primary brand content"],
      ["IG Post (Static)", "ig-post", 0.77, "Product feature or tag"],
      ["TikTok Video", "tiktok", 0.69, "Short-form brand integration"],
      ["Story Set (5)", "stories", 0.35, "24hr promotional content"],
      ["Full Bundle", "bundle", 1.85, "Multi-platform package"],
      ["Monthly Retainer", "retainer", 3.23, "Ongoing brand ambassador"],
    ];
    var baseHigh = rate.high || 100;
    var baseLow = rate.low || 50;
    document.getElementById("r-rates").innerHTML = deliverables.map(function(d){
      var lo = Math.round(baseLow * d[2]);
      var hi = Math.round(baseHigh * d[2]);
      return "<tr><td>"+d[0]+"</td><td class='rate-val'>$"+lo.toLocaleString()+" – $"+hi.toLocaleString()+"</td><td style='color:rgba(240,237,230,0.4);font-size:11px'>"+d[3]+"</td></tr>";
    }).join("");

    // Brand experience
    var brands = deals.filter(function(d){ return d.brand; });
    if (brands.length) {
      document.getElementById("r-brands").innerHTML = brands.map(function(d){
        return '<div class="brand-chip">'+d.brand+(d.stage==="Closed"?" ✓":"")+"</div>";
      }).join("");
    } else {
      document.getElementById("r-brands-section").style.display = "none";
    }

    // Campaign concept / agent message
    if (data.agentMessage) {
      document.getElementById("r-message-section").style.display = "block";
      document.getElementById("r-message-text").textContent = data.agentMessage;
    }

    // Agent CTA
    document.getElementById("r-agent").textContent = (agent.name||"Your Agent") + (agent.email ? " · "+agent.email : "");

    // Footer
    var exp = new Date(data.expiresAt);
    document.getElementById("r-expires").textContent = "Valid until "+exp.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})+" · Generated by NILDash";

  }).catch(function(){
    document.getElementById("loading").textContent = "Error loading pitch deck.";
  });
}

function reachCard(val, label, sub) {
  return "<div class='reach-card'><div class='reach-val'>"+val+"</div><div class='reach-lbl'>"+label+"</div><div class='reach-sub'>"+sub+"</div></div>";
}
</script>
</body>
</html>
