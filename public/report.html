<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIL Brand Pitch — NILDash</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F6F3;color:#1a1a1a;font-family:"Inter",sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.page{max-width:720px;margin:0 auto;padding:48px 32px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:48px;padding-bottom:24px;border-bottom:1px solid #e2e0db}
.logo{font-family:"Inter",sans-serif;font-size:15px;font-weight:600;color:#1a1a1a;letter-spacing:-0.02em}
.logo span{color:#2d6a2d}
.confidential{font-size:10px;color:#999;letter-spacing:0.12em;text-transform:uppercase}
.hero{display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:start;margin-bottom:44px}
.avatar{width:88px;height:88px;border-radius:10px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-family:"Inter",sans-serif;font-size:28px;font-weight:600;color:#fff;flex-shrink:0;letter-spacing:-0.02em}
.athlete-name{font-family:"Playfair Display",serif;font-size:38px;font-weight:700;color:#1a1a1a;line-height:1.05;margin-bottom:8px;letter-spacing:-0.01em}
.athlete-meta{font-size:13px;color:#777;margin-bottom:16px;font-weight:400}
.tags{display:flex;gap:8px;flex-wrap:wrap}
.tag{font-size:10px;padding:4px 12px;border-radius:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em}
.tag-sport{background:#1a1a1a;color:#fff}
.tag-tier{background:#ece9e2;color:#666}
.section{margin-bottom:36px}
.section-title{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::after{content:"";flex:1;height:1px;background:#e2e0db}
.reach-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.reach-card{background:#fff;border:1px solid #e2e0db;border-radius:8px;padding:16px;text-align:center}
.reach-val{font-family:"Inter",sans-serif;font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:4px;letter-spacing:-0.02em}
.reach-lbl{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.08em}
.reach-sub{font-size:11px;color:#2d6a2d;margin-top:3px;font-weight:600}
.selling-points{display:flex;flex-direction:column;gap:8px}
.sp-row{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;background:#fff;border:1px solid #e2e0db;border-radius:8px}
.sp-icon{width:6px;height:6px;border-radius:50%;background:#1a1a1a;flex-shrink:0;margin-top:6px}
.sp-text{font-size:13px;color:#444;line-height:1.65}
.sp-bold{font-weight:600;color:#1a1a1a}
.rate-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e2e0db;border-radius:8px;overflow:hidden}
.rate-table th{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.1em;padding:10px 16px;text-align:left;background:#faf9f7;border-bottom:1px solid #e2e0db;font-weight:600}
.rate-table td{padding:12px 16px;border-bottom:1px solid #f0ede8;font-size:13px;color:#333}
.rate-table tr:last-child td{border-bottom:none}
.rate-val{font-weight:600;color:#1a1a1a}
.brands-grid{display:flex;flex-wrap:wrap;gap:8px}
.brand-chip{padding:6px 16px;background:#fff;border:1px solid #e2e0db;border-radius:40px;font-size:12px;color:#555;font-weight:500}
.cta{background:#1a1a1a;border-radius:10px;padding:28px;text-align:center}
.cta-title{font-family:"Playfair Display",serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:6px}
.cta-sub{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:16px}
.cta-contact{font-size:13px;color:#fff;font-weight:500}
.footer{margin-top:40px;padding-top:20px;border-top:1px solid #e2e0db;display:flex;justify-content:space-between;align-items:center}
.footer-logo{font-size:13px;font-weight:600;color:#bbb;letter-spacing:-0.01em}
.footer-logo span{color:#2d6a2d}
.footer-note{font-size:10px;color:#bbb}
.empty{color:#aaa;font-size:12px;font-style:italic}
@media print{body{background:#fff}.page{padding:24px}.reach-card,.sp-row,.rate-table{border-color:#ddd}.section-title{color:#888}.reach-lbl{color:#888}}
</style>
</head>
<body>
<div class="page">
  <div id="loading" style="text-align:center;padding:80px;color:#999">Loading pitch deck...</div>
  <div id="content" style="display:none">

    <div class="header">
      <div class="logo">NIL<span>Dash</span></div>
      <div class="confidential">Confidential Brand Pitch</div>
    </div>

    <div class="hero">
      <div class="avatar" id="r-initials"></div>
      <div>
        <div class="athlete-name" id="r-name"></div>
        <div class="athlete-meta" id="r-meta"></div>
        <div class="tags" id="r-tags"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Why This Athlete</div>
      <div class="selling-points" id="r-selling-points"></div>
    </div>

    <div class="section">
      <div class="section-title">Social Reach & Engagement</div>
      <div class="reach-grid" id="r-reach"></div>
    </div>

    <div class="section">
      <div class="section-title">Rate Card</div>
      <table class="rate-table">
        <thead><tr><th>Deliverable</th><th>Rate</th><th>Notes</th></tr></thead>
        <tbody id="r-rates"></tbody>
      </table>
    </div>

    <div class="section" id="r-brands-section">
      <div class="section-title">Brand Experience</div>
      <div class="brands-grid" id="r-brands"></div>
    </div>

    <div class="section" id="r-message-section" style="display:none">
      <div class="section-title">Campaign Concept</div>
      <div style="background:#fff;border:1px solid #e2e0db;border-radius:8px;padding:16px;font-size:13px;color:#444;line-height:1.7" id="r-message-text"></div>
    </div>

    <div class="cta">
      <div class="cta-title">Ready to Partner?</div>
      <div class="cta-sub">Contact the agent to discuss deal terms and availability.</div>
      <div class="cta-contact" id="r-agent"></div>
    </div>

    <div class="footer">
      <div class="footer-logo">NILDash</div>
      <div class="footer-note" id="r-expires"></div>
    </div>

  </div>
</div>

<script>
var token = window.location.pathname.split("/report/")[1];
if (!token) { document.getElementById("loading").textContent = "Invalid link."; }
else {
  fetch("/api/reports/" + token).then(function(r){return r.json();}).then(function(data){
    if (data.error) { document.getElementById("loading").textContent = data.error; return; }
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";

    var ath = data.athlete;
    var deals = data.deals || [];
    var rate = data.rate || {};
    var agent = data.agent || {};

    // Initials
    var parts = (ath.name||"A").split(" ");
    document.getElementById("r-initials").textContent = parts.map(function(p){return p[0];}).join("").substring(0,2).toUpperCase();

    // Name + meta
    document.getElementById("r-name").textContent = ath.name || "Athlete";
    document.getElementById("r-meta").textContent = [ath.position, ath.sport, ath.school, ath.year].filter(Boolean).join(" · ");

    // Tags
    var reach = (ath.instagram||0)+(ath.tiktok||0);
    var tier = reach>500000?"Macro Influencer":reach>100000?"Mid-Tier":reach>25000?"Micro Influencer":"Nano Influencer";
    document.getElementById("r-tags").innerHTML =
      (ath.sport ? '<span class="tag tag-sport">'+ath.sport+'</span>' : "") +
      (ath.schoolTier ? '<span class="tag tag-tier">'+ath.schoolTier+'</span>' : '<span class="tag tag-tier">'+tier+"</span>");

    // Selling points
    var eng = parseFloat(ath.engagement||0);
    var avgEng = ath.sport && ath.sport.toLowerCase().includes("basketball") ? 4.5 : 3.8;
    var engLabel = eng > avgEng ? "Above average engagement for "+ath.sport : "Consistent engagement rate";
    var sp = [
      { icon: "&#128293;", bold: "Authentic college athlete voice", text: " — real student-athlete content that resonates with 18-24 demographic." },
      { icon: "&#127775;", bold: engLabel, text: " at "+eng+"% vs "+avgEng+"% sport average. High-quality, engaged following." },
      { icon: "&#127942;", bold: "Competitive program at "+(ath.school||"a top university"), text: " with national media exposure and strong alumni network." },
      { icon: "&#128205;", bold: "Market reach in "+(ath.school ? ath.school.replace("University","").replace("of","").trim() : "college market"), text: " — highly targeted local and regional brand exposure." },
    ];
    document.getElementById("r-selling-points").innerHTML = sp.map(function(s){
      return '<div class="sp-row"><div class="sp-icon"></div><div class="sp-text"><span class="sp-bold">'+s.bold+"</span>"+s.text+"</div></div>";
    }).join("");

    // Reach grid
    var igFmt = (ath.instagram||0) >= 1000 ? ((ath.instagram||0)/1000).toFixed(1)+"K" : String(ath.instagram||0);
    var ttFmt = (ath.tiktok||0) >= 1000 ? ((ath.tiktok||0)/1000).toFixed(1)+"K" : String(ath.tiktok||0);
    var totalFmt = reach >= 1000 ? (reach/1000).toFixed(1)+"K" : String(reach);
    document.getElementById("r-reach").innerHTML =
      reachCard(igFmt, "Instagram", (ath.instagram||0) > 0 ? "Active" : "—") +
      reachCard(ttFmt, "TikTok", (ath.tiktok||0) > 0 ? "Active" : "—") +
      reachCard(totalFmt, "Total Reach", "Combined") +
      reachCard(eng+"%", "Engagement", eng > avgEng ? "Above avg" : "On target");

    // Rate card
    var deliverables = [
      ["IG Reel (30-60s)", "ig-reel", 1.0, "Primary brand content"],
      ["IG Post (Static)", "ig-post", 0.77, "Product feature or tag"],
      ["TikTok Video", "tiktok", 0.69, "Short-form brand integration"],
      ["Story Set (5)", "stories", 0.35, "24hr promotional content"],
      ["Full Bundle", "bundle", 1.85, "Multi-platform package"],
      ["Monthly Retainer", "retainer", 3.23, "Ongoing brand ambassador"],
    ];
    var baseHigh = rate.high || 100;
    var baseLow = rate.low || 50;
    document.getElementById("r-rates").innerHTML = deliverables.map(function(d){
      var lo = Math.round(baseLow * d[2]);
      var hi = Math.round(baseHigh * d[2]);
      return "<tr><td>"+d[0]+"</td><td class='rate-val'>$"+lo.toLocaleString()+" – $"+hi.toLocaleString()+"</td><td style='color:#999;font-size:12px'>"+d[3]+"</td></tr>";
    }).join("");

    // Brand experience
    var brands = deals.filter(function(d){ return d.brand; });
    if (brands.length) {
      document.getElementById("r-brands").innerHTML = brands.map(function(d){
        return '<div class="brand-chip">'+d.brand+(d.stage==="Closed"?" ✓":"")+"</div>";
      }).join("");
    } else {
      document.getElementById("r-brands-section").style.display = "none";
    }

    // Campaign concept / agent message
    if (data.agentMessage) {
      document.getElementById("r-message-section").style.display = "block";
      document.getElementById("r-message-text").textContent = data.agentMessage;
    }

    // Agent CTA
    document.getElementById("r-agent").textContent = (agent.name||"Your Agent") + (agent.email ? " · "+agent.email : "");

    // Footer
    var exp = new Date(data.expiresAt);
    document.getElementById("r-expires").textContent = "Valid until "+exp.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})+" · Generated by NILDash";

  }).catch(function(){
    document.getElementById("loading").textContent = "Error loading pitch deck.";
  });
}

function reachCard(val, label, sub) {
  return "<div class='reach-card'><div class='reach-val'>"+val+"</div><div class='reach-lbl'>"+label+"</div><div class='reach-sub'>"+sub+"</div></div>";
}
</script>
</body>
</html>
