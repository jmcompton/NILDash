<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - NILDash</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A08;color:#F0EDE6;font-family:monospace;font-size:13px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#111110;border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:40px;width:100%;max-width:420px}
.logo{font-size:24px;font-weight:800;color:#C8F135;margin-bottom:4px}
.sub{font-size:12px;color:rgba(240,237,230,0.45);margin-bottom:28px}
label{display:block;font-size:10px;color:rgba(240,237,230,0.4);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
input{width:100%;padding:11px 14px;background:#1A1A18;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#F0EDE6;font-size:13px;font-family:monospace;outline:none;margin-bottom:16px}
.btn{width:100%;padding:13px;background:#C8F135;color:#000;border:none;border-radius:40px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}
.msg{font-size:12px;margin-bottom:16px;padding:10px 14px;border-radius:6px;display:none}
.msg.success{background:rgba(200,241,53,0.1);border:1px solid rgba(200,241,53,0.3);color:#C8F135}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444}
a{color:#C8F135;text-decoration:none;font-size:12px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">NILDash</div>
  <div class="sub" id="page-sub">Reset your password</div>
  <div class="msg" id="msg"></div>
  <div id="forgot-form">
    <label>Your Email</label>
    <input type="email" id="forgot-email" placeholder="you@example.com">
    <button class="btn" onclick="sendReset()">Send Reset Link</button>
    <div style="text-align:center;margin-top:16px"><a href="/">Back to Sign In</a></div>
  </div>
  <div id="reset-form" style="display:none">
    <label>New Password</label>
    <input type="password" id="new-password" placeholder="Min 6 characters">
    <label>Confirm Password</label>
    <input type="password" id="confirm-password" placeholder="Confirm password">
    <button class="btn" onclick="doReset()">Set New Password</button>
  </div>
  <div id="success-view" style="display:none;text-align:center;padding:20px 0">
    <div style="font-size:32px;margin-bottom:16px">&#10003;</div>
    <div style="font-size:16px;font-weight:700;color:#F0EDE6;margin-bottom:8px" id="success-msg">Done!</div>
    <div style="font-size:12px;color:rgba(240,237,230,0.45);margin-bottom:24px" id="success-sub"></div>
    <a href="/">Back to Sign In</a>
  </div>
</div>
<script>
var token = new URLSearchParams(window.location.search).get("token");
if (token) {
  document.getElementById("forgot-form").style.display = "none";
  document.getElementById("reset-form").style.display = "block";
  document.getElementById("page-sub").textContent = "Enter your new password";
}
function showMsg(text, type) {
  var el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + type;
  el.style.display = "block";
}
async function sendReset() {
  var email = document.getElementById("forgot-email").value.trim();
  if (!email) return showMsg("Please enter your email", "error");
  try {
    var r = await fetch("/api/auth/forgot-password", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({email: email})
    });
    var data = await r.json();
    if (data.ok) {
      document.getElementById("forgot-form").style.display = "none";
      document.getElementById("success-view").style.display = "block";
      document.getElementById("success-msg").textContent = "Check your email";
      document.getElementById("success-sub").textContent = "We sent a reset link to " + email + ". It expires in 1 hour.";
    } else {
      showMsg(data.error || "Something went wrong", "error");
    }
  } catch(e) {
    showMsg("Connection error. Try again.", "error");
  }
}
async function doReset() {
  var pass = document.getElementById("new-password").value;
  var confirm = document.getElementById("confirm-password").value;
  if (pass.length < 6) return showMsg("Password must be at least 6 characters", "error");
  if (pass !== confirm) return showMsg("Passwords do not match", "error");
  try {
    var r = await fetch("/api/auth/reset-password", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({token: token, password: pass})
    });
    var data = await r.json();
    if (data.ok) {
      document.getElementById("reset-form").style.display = "none";
      document.getElementById("success-view").style.display = "block";
      document.getElementById("success-msg").textContent = "Password updated!";
      document.getElementById("success-sub").textContent = "Your password has been reset. Sign in with your new password.";
    } else {
      showMsg(data.error || "Something went wrong", "error");
    }
  } catch(e) {
    showMsg("Connection error. Try again.", "error");
  }
}
</script>
</body>
</html>
